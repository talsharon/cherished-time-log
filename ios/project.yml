name: TimeTracker
options:
  bundleIdPrefix: com.cherished
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0

targets:
  TimeTracker:
    type: application
    platform: iOS
    sources:
      - path: TimeTracker
        excludes:
          - Info.plist
      - path: Shared
    dependencies:
      - package: Supabase
        product: Supabase
      - target: TimeTrackerWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cherished.TimeTracker
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: TimeTracker/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Time Tracker
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig

  TimeTrackerWatch:
    type: application
    platform: watchOS
    sources:
      - path: TimeTrackerWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cherished.TimeTracker.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Time
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.cherished.TimeTracker
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: NO
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig

schemes:
  TimeTracker:
    build:
      targets:
        TimeTracker: all
        TimeTrackerWatch: all
    run:
      config: Debug
