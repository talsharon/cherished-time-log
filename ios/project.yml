name: TimeTracker
options:
  bundleIdPrefix: com.talsharon
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0

targets:
  TimeTracker:
    type: application
    platform: iOS
    sources:
      - path: TimeTracker
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
    entitlements:
      path: TimeTracker/TimeTracker.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.talsharon.TimeTracker
    dependencies:
      - package: Supabase
        product: Supabase
      - target: TimeTrackerWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talsharon.TimeTracker
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: TimeTracker/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Time Tracker
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig

  TimeTrackerWatch:
    type: application
    platform: watchOS
    sources:
      - path: TimeTrackerWatch
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
    entitlements:
      path: TimeTrackerWatch/TimeTrackerWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.talsharon.TimeTracker
    dependencies:
      - target: TimeTrackerWatchWidgets
        embed: true
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talsharon.TimeTracker.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: TimeTrackerWatch/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Time Tracker
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.talsharon.TimeTracker
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: NO
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig

  TimeTrackerWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: TimeTrackerWatchWidgets
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
    entitlements:
      path: TimeTrackerWatchWidgets/TimeTrackerWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.talsharon.TimeTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talsharon.TimeTracker.watchkitapp.widgets
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TimeTrackerWatchWidgets/Info.plist
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig

schemes:
  TimeTracker:
    build:
      targets:
        TimeTracker: all
        TimeTrackerWatch: all
    run:
      config: Debug
